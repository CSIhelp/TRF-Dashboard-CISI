<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Stewrd</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { 
    --brand: #2FAAE1; 
    --bg: #f4f9fc; 
    --card-bg: #ffffff; 
    --text-primary: #0d2d3a; 
    --input-bg: #f0f8fd; 
    --input-border: #b8dff0; 
  }
  body.dark { 
    --bg: #071820; 
    --card-bg: #0d2535; 
    --text-primary: #e0f4fd; 
    --input-bg: #071820; 
    --input-border: #1a3f55; 
  }
  body { 
    font-family: 'Inter', sans-serif; 
    background: var(--bg); 
    color: var(--text-primary); 
    height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    margin: 0; 
  }
  .login-card { 
    background: var(--card-bg); 
    padding: 40px; 
    border-radius: 12px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    width: 100%; 
    max-width: 400px; 
    text-align: center; 
  }
  .login-card img { 
    height: 40px; 
    margin-bottom: 20px; 
  }
  
  /* Input Styles */
  input { 
    width: 100%; 
    background: var(--input-bg); 
    border: 1px solid var(--input-border); 
    padding: 12px; 
    border-radius: 8px; 
    margin-bottom: 16px; 
    color: var(--text-primary); 
    outline: none; 
    box-sizing: border-box; 
  }
  input:focus { 
    border-color: var(--brand); 
  }

  /* Password Wrapper Styles */
  .password-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 16px;
  }
  .password-wrap input {
    margin-bottom: 0; /* Remove bottom margin because the wrapper handles it */
    padding-right: 60px; /* Leave room for the Show/Hide button */
  }
  
  /* Override global button styles specifically for the toggle button */
  button.toggle-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: gray;
    width: auto;
    padding: 0;
    font-size: 13px;
    font-weight: 600;
  }
  button.toggle-btn:hover {
    color: var(--brand);
    opacity: 1;
  }

  /* Main Sign In Button Styles */
  button.primary-btn { 
    width: 100%; 
    background: var(--brand); 
    color: #fff; 
    border: none; 
    padding: 12px; 
    border-radius: 8px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: 0.2s; 
  }
  button.primary-btn:hover { 
    opacity: 0.9; 
  }
</style>
</head>
<body class="dark">
  <div class="login-card">
    <img src="stewrd-logo.png" alt="Stewrd Logo" onerror="this.style.display='none'">
    <h2>Admin Portal</h2>
    <p style="font-size: 13px; color: gray; margin-bottom: 24px;">Sign in to manage HR & TRF records</p>
    
    <input type="email" id="email" placeholder="Email Address" required>
    
    <div class="password-wrap">
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" class="toggle-btn" id="togglePassword">Show</button>
    </div>

    <button onclick="signIn()" id="loginBtn" class="primary-btn">Sign In</button>
    <p id="errorMsg" style="color: #dc2626; font-size: 12px; margin-top: 12px; display: none;"></p>
  </div>

  <script>
    // ⚠️ Initialize Supabase
    const supabaseUrl = 'https://vuycjivcpyncmaiikpfe.supabase.co';
    const supabaseKey = 'sb_publishable_5StoCQqroJgcqn_Z4NDzqQ_LVXXHabG';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- Show/Hide Password Logic ---
    const passwordInput = document.getElementById('password');
    const toggleButton = document.getElementById('togglePassword');

    toggleButton.addEventListener('click', function () {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleButton.textContent = 'Hide';
      } else {
        passwordInput.type = 'password';
        toggleButton.textContent = 'Show';
      }
    });

    // --- Sign In Logic ---
    async function signIn() {
      const email = document.getElementById('email').value;
      const password = passwordInput.value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      
      btn.textContent = 'Signing in...';
      err.style.display = 'none';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.textContent = 'Sign In';
      } else {
        // Redirect to your main dashboard on success
        window.location.href = 'homepage.html'; 
      }
    }
  </script>
</body>
</html>
